name: Build on windows
on:
  release:
    types: [published]
jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install NSIS
        run: choco install nsis -y

      - name: Copy license for NSIS
        run: Copy-Item LICENSE Installer\License.txt

      - name: Build (build.ps1 Release x64)
        shell: pwsh
        run: .\build.ps1 Release x64

      - name: Create release archive
        shell: pwsh
        run: |
          $zipDir = New-Item -ItemType Directory -Path "Installer\Zip" -Force
          Copy-Item "Installer\EIDInstallx64.exe" -Destination $zipDir
          Copy-Item "Installer\License.txt" -Destination $zipDir
          if (Test-Path "Installer\SHA256SUMS.txt") {
              Copy-Item "Installer\SHA256SUMS.txt" -Destination $zipDir
          }
          Compress-Archive -Path "$($zipDir.FullName)\*" -DestinationPath "Installer\EIDAuthentication-x64.zip" -Force

      - name: Package SBOM (if present)
        shell: pwsh
        run: |
          if (Test-Path "Installer\sbom") {
              Compress-Archive -Path "Installer\sbom\*" -DestinationPath "Installer\EIDAuthentication-sbom.zip" -Force
          } else {
              Write-Host "No SBOM directory to package."
          }

      - name: upload binaries to release
        uses: softprops/action-gh-release@v2
        if: ${{startsWith(github.ref, 'refs/tags/') }}
        with:
            files: |
              Installer/EIDInstallx64.exe
              Installer/EIDAuthentication-x64.zip
              Installer/SHA256SUMS.txt
              Installer/EIDAuthentication-sbom.zip
