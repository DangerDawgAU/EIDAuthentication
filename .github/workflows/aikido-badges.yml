name: Aikido Badges

# Aikido has no native README badge, and its only code-quality endpoint is
# per-PR (no repo-level metric), so this publishes a live shields.io *endpoint*
# JSON for the repo-wide SECURITY posture (open issue counts by severity).
# The JSON is force-pushed to an orphan `badges` branch that the README reads
# via raw.githubusercontent.com. Runs on push-to-main, daily, and on demand.
on:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * *'   # daily refresh even without pushes
  workflow_dispatch:

permissions:
  contents: read

jobs:
  badges:
    name: Publish Aikido badge JSON
    runs-on: ubuntu-latest
    permissions:
      contents: write   # force-push generated JSON to the badges branch
    steps:
      - name: Generate Aikido security badge JSON
        uses: actions/github-script@v8
        env:
          AIKIDO_API_CLIENT_ID: ${{ secrets.AIKIDO_API_CLIENT_ID }}
          AIKIDO_API_CLIENT_SECRET: ${{ secrets.AIKIDO_API_CLIENT_SECRET }}
          AIKIDO_REPO_NAME: EIDAuthentication
        with:
          script: |
            const fs = require('fs');
            const aid = process.env.AIKIDO_API_CLIENT_ID, asec = process.env.AIKIDO_API_CLIENT_SECRET;
            let message = 'unavailable', color = 'lightgrey';
            try {
              if (!aid || !asec) throw new Error('missing credentials');
              const basic = Buffer.from(`${aid}:${asec}`).toString('base64');
              const tr = await fetch('https://app.aikido.dev/api/oauth/token', {
                method: 'POST',
                headers: { Authorization: `Basic ${basic}`, 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'grant_type=client_credentials',
              });
              if (!tr.ok) throw new Error(`token ${tr.status}`);
              const token = (await tr.json()).access_token;
              const repo = encodeURIComponent(process.env.AIKIDO_REPO_NAME);
              const cr = await fetch(
                `https://app.aikido.dev/api/public/v1/issues/counts?filter_code_repo_name=${repo}`,
                { headers: { Authorization: `Bearer ${token}` } });
              if (!cr.ok) throw new Error(`counts ${cr.status}`);
              const body = await cr.json();
              const s = body.issues || body.issue_groups || {};
              const crit = +s.critical || 0, high = +s.high || 0, med = +s.medium || 0, low = +s.low || 0;
              const all = (s.all != null) ? +s.all : crit + high + med + low;
              if (all === 0) {
                message = 'no open issues'; color = 'brightgreen';
              } else {
                color = (crit + high) ? 'red' : med ? 'orange' : 'yellow';
                const parts = [];
                if (crit) parts.push(`${crit} critical`);
                if (high) parts.push(`${high} high`);
                if (med) parts.push(`${med} medium`);
                if (low) parts.push(`${low} low`);
                message = parts.join(' · ') || `${all} open`;
              }
              core.info(`aikido security badge: "${message}" (${color})`);
            } catch (e) {
              message = 'unavailable'; color = 'lightgrey';
              core.warning(`aikido badge: ${e.message}`);
            }
            fs.mkdirSync('out', { recursive: true });
            fs.writeFileSync('out/aikido-security.json', JSON.stringify({
              schemaVersion: 1, label: 'Aikido Security', message, color,
            }));
            core.info(fs.readFileSync('out/aikido-security.json', 'utf8'));

      - name: Force-push JSON to the badges branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd out
          git init -q -b badges
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -qm "chore(badges): refresh Aikido status [skip ci]"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" badges
