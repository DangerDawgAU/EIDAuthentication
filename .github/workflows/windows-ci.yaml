name: CI

on:
  push:
    branches: [main, development]
  pull_request:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    # Least privilege: the build needs only read access. Publishing to a
    # GitHub Release (which needs contents: write) is done by the separate
    # release job below, on release events only.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false  # build only; no git push needs the token

      # Cache the bundled minidrivers so we don't re-hit vendor sites every run.
      # The key tracks Installer/Stage-Minidrivers.ps1, which carries the URL +
      # SHA-256 manifest for each driver; changing either rotates the cache.
      - name: Cache bundled minidrivers
        uses: actions/cache@v5
        with:
          path: Installer/drivers
          key: drivers-${{ hashFiles('Installer/Stage-Minidrivers.ps1') }}

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Stage LICENSE for NSIS
        shell: pwsh
        run: Copy-Item LICENSE Installer\License.txt -Force

      - name: Build (Release x64)
        shell: pwsh
        run: .\build.ps1 -Configuration Release -Platform x64

      - name: Package release zip
        shell: pwsh
        run: |
          $zip = New-Item -ItemType Directory -Path Installer\Zip -Force
          Copy-Item Installer\EIDInstallx64.exe $zip -Force
          Copy-Item Installer\License.txt      $zip -Force
          if (Test-Path Installer\SHA256SUMS.txt) {
            Copy-Item Installer\SHA256SUMS.txt $zip -Force
          }
          Compress-Archive -Path "$($zip.FullName)\*" `
            -DestinationPath Installer\EIDAuthentication-x64.zip -Force

      # Always store the build outputs as workflow artifacts. On CI/PR runs these
      # are the deliverable; on release runs the release job below downloads them
      # to attach to the GitHub Release (keeps write scope out of this job).
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: EIDAuthentication-${{ github.sha }}
          path: |
            Installer/EIDInstallx64.exe
            Installer/EIDAuthentication-x64.zip
            Installer/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: build-log-${{ github.sha }}
          path: build.log
          if-no-files-found: warn
          retention-days: 14

  # Release runs only: attach the built artifacts to the GitHub Release that
  # triggered us. Isolated here so contents: write is scoped to release events.
  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to upload assets to the GitHub Release
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: EIDAuthentication-${{ github.sha }}
          path: dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3
        with:
          files: |
            dist/EIDInstallx64.exe
            dist/EIDAuthentication-x64.zip
            dist/SHA256SUMS.txt
